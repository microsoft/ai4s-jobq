repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: check-yaml
    -   id: check-added-large-files
        args: [--maxkb=500]
    -   id: check-merge-conflict
    -   id: detect-private-key
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        types: [python]
        # Only check source code, not tests (matches CI: `mypy ai4s/`)
        files: ^ai4s/
        # Install the package itself so mypy sees all runtime deps and their types.
        additional_dependencies:
          - ai4s-jobq[dev,track]
        args:
          - --no-namespace-packages
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

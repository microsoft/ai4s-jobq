StylesPath = vale-styles
MinAlertLevel = warning
IgnoredScopes = tt, code
Vocab = JobQ

Packages = Google

[formats]
mdx = md

[*.{md,markdown,rst}]
BasedOnStyles = Vale, Google, JobQ

# --- Disabled: too noisy for technical documentation ---
Google.Passive = NO
Google.Parens = NO
Google.Contractions = NO
Google.We = NO
Google.Will = NO
Google.Acronyms = NO
Google.WordList = NO
Vale.Terms = NO
Vale.Avoid = NO

# --- Enabled: genuinely useful checks ---
Google.Headings = NO
Google.Latin = YES
Google.Ellipses = YES
Google.EmDash = YES
Google.LyHyphens = YES
Google.Colons = YES
JobQ.Headings = YES
JobQ.Latin = YES

# CHANGELOG: enforce most rules but disable noisy ones
[CHANGELOG.md]
Vale.Repetition = NO
JobQ.Headings = NO

name: Python package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .[dev]
    - name: Ruff lint
      run: ruff check --output-format=github .
    - name: Ruff format check
      run: ruff format --check .
    - name: Mypy
      run: mypy ai4s/ --no-namespace-packages

  docs-lint:
    name: Docs Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install linters
      run: |
        python -m pip install --upgrade pip
        python -m pip install doc8 vale
        npm install -g markdownlint-cli
    - name: Download Vale styles
      run: vale sync
    - name: doc8 (RST)
      run: doc8
    - name: markdownlint (Markdown)
      run: markdownlint '**/*.md' --ignore node_modules --ignore vale-styles
    - name: Vale (prose style)
      run: vale --minAlertLevel error docs/ README.md CONTRIBUTING.md SUPPORT.md SECURITY.md CODE_OF_CONDUCT.md

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        include:
          - python-version: '3.10'
            toxenv: py310
          - python-version: '3.11'
            toxenv: py311
          - python-version: '3.12'
            toxenv: py312

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        npm install azurite
        ./node_modules/.bin/azurite-blob --skipApiVersionCheck --inMemoryPersistence --blobPort 10000 &
        ./node_modules/.bin/azurite-queue --skipApiVersionCheck --inMemoryPersistence --queuePort 10001 &
        python -m pip install --upgrade pip
        python -m pip install tox tox-gh-actions
    - name: Test with tox
      run: |
        tox -e ${{ matrix.toxenv }}

  docs:
    name: Docs Accessibility
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox tox-gh-actions
    - name: Test Docs Accessibility
      run: |
        tox -e accessibility
